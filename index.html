<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT多开浏览器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-layout">
        <aside class="side-rail">
            <div class="brand-block">
                <img src="yutonglogo.png" alt="YT Logo" class="brand-logo">
                <div>
                    <h1>YT多开浏览器</h1>
                    <span>多开工作台</span>
                </div>
            </div>

            <nav class="nav-list" aria-label="主导航">
                <button class="nav-item active" type="button" data-view="accounts">
                    <span class="nav-icon" data-icon="grid"></span>
                    <span>环境</span>
                </button>
                <button class="nav-item" type="button" id="open-root-folder-btn">
                    <span class="nav-icon" data-icon="folder"></span>
                    <span>数据目录</span>
                </button>
                <button class="nav-item" type="button" id="nav-update-btn">
                    <span class="nav-icon" data-icon="refresh"></span>
                    <span>更新</span>
                </button>
            </nav>

            <section class="rail-metrics" aria-label="环境统计">
                <div class="rail-metric">
                    <span>环境总数</span>
                    <strong id="total-accounts">0</strong>
                </div>
                <div class="rail-metric">
                    <span>正在运行</span>
                    <strong id="running-count">0</strong>
                </div>
                <div class="rail-metric">
                    <span>今日启动</span>
                    <strong id="today-count">0</strong>
                </div>
            </section>

            <div class="rail-footer">
                <span>Chrome 状态：<strong id="chrome-state-label">已连接</strong></span>
                <span id="app-version-label">V ---</span>
            </div>
        </aside>

        <main class="workspace">
            <header class="workspace-header">
                <div class="workspace-title">
                    <h2>多开环境</h2>
                    <p id="workspace-subtitle">0 个独立浏览器环境</p>
                </div>
                <div class="header-actions">
                    <div class="action-group" aria-label="批量操作">
                        <button class="btn primary" id="launch-all-btn" type="button">
                            <span data-icon="play"></span>
                            <span class="btn-label">按序启动全部</span>
                        </button>
                        <button class="btn danger-outline" id="close-all-btn" type="button">
                            <span data-icon="x-circle"></span>
                            <span class="btn-label">关闭全部</span>
                        </button>
                    </div>
                    <span class="action-divider" aria-hidden="true"></span>
                    <div class="action-group" aria-label="创建操作">
                        <button class="btn" id="bulk-account-btn" type="button">
                            <span data-icon="plus"></span>
                            批量新建
                        </button>
                        <button class="btn primary" id="add-account-btn" type="button">
                            <span data-icon="plus"></span>
                            新建环境
                        </button>
                    </div>
                </div>
            </header>

            <section class="toolbar">
                <label class="search-field">
                    <span data-icon="search"></span>
                    <input id="profile-search" type="search" placeholder="搜索环境名称或 ID">
                </label>
                <div class="segmented" role="tablist" aria-label="环境筛选">
                    <button class="segment active" data-filter="all" type="button">全部</button>
                    <button class="segment" data-filter="running" type="button">运行中</button>
                    <button class="segment" data-filter="idle" type="button">未启动</button>
                </div>
            </section>

            <section class="account-panel">
                <div class="account-table">
                    <div class="table-head" aria-hidden="true">
                        <span>环境</span>
                        <span>状态</span>
                        <span>最后启动</span>
                        <span>数据</span>
                        <span>操作</span>
                    </div>
                    <div id="account-list" class="table-body"></div>
                    <div id="empty-state" class="empty-state" hidden>
                        <span class="empty-mark" data-icon="grid"></span>
                        <h3>先创建第一个环境</h3>
                        <p>每个环境都会保存独立的登录状态和浏览器数据。</p>
                        <button class="btn primary" id="empty-create-btn" type="button">新建环境</button>
                    </div>
                </div>
            </section>
        </main>

        <aside class="drawer" id="side-drawer" aria-hidden="true">
            <div class="drawer-header">
                <div>
                    <h2 id="drawer-title">新建环境</h2>
                    <p id="drawer-subtitle">创建一个独立浏览器环境。</p>
                </div>
                <button class="icon-btn" id="drawer-close" type="button" aria-label="关闭">
                    <span data-icon="x"></span>
                </button>
            </div>

            <form class="drawer-body" id="account-form">
                <div class="field">
                    <label for="acc-name">环境名称</label>
                    <input id="acc-name" type="text" placeholder="如: 客户开发-香港-01" autocomplete="off">
                </div>
                <div class="drawer-footer">
                    <button class="btn" id="drawer-cancel" type="button">取消</button>
                    <button class="btn primary" id="modal-save" type="submit">保存</button>
                </div>
            </form>

            <form class="drawer-body" id="bulk-form" hidden>
                <div class="field">
                    <label for="bulk-prefix">名称前缀</label>
                    <input id="bulk-prefix" type="text" placeholder="如: 客户开发" autocomplete="off">
                </div>
                <div class="field">
                    <label for="bulk-count">数量</label>
                    <input id="bulk-count" type="number" min="1" max="200" value="10">
                </div>
                <div class="preview-list" id="bulk-preview"></div>
                <div class="drawer-footer">
                    <button class="btn" id="bulk-cancel" type="button">取消</button>
                    <button class="btn primary" id="bulk-save" type="submit">创建</button>
                </div>
            </form>

            <div class="drawer-body" id="data-panel" hidden>
                <div class="profile-card">
                    <span>当前环境</span>
                    <strong id="data-profile-name">-</strong>
                    <small id="data-profile-id">ID -</small>
                </div>
                <div class="data-lines">
                    <div><span>运行状态</span><strong id="data-profile-status">-</strong></div>
                    <div><span>最后启动</span><strong id="data-profile-last">-</strong></div>
                    <div><span>数据</span><strong>已保存</strong></div>
                </div>
                <button class="btn primary full-width" id="data-open-folder" type="button">
                    <span data-icon="folder"></span>
                    打开数据目录
                </button>
                <p class="drawer-note">每个环境都有独立的数据目录。迁移电脑时，备份对应目录即可保留该账号的浏览器数据。</p>
            </div>
        </aside>
    </div>

    <div class="toast-host" id="toast-host"></div>
    <div class="update-dock" id="update-dock" hidden>
        <div class="update-dock-main">
            <span class="update-dock-icon" data-icon="download"></span>
            <div class="update-dock-copy">
                <strong id="update-dock-title">正在检查更新</strong>
                <span id="update-dock-detail">请稍候</span>
            </div>
        </div>
        <div class="update-dock-progress" id="update-dock-progress" hidden>
            <span id="update-dock-bar"></span>
        </div>
        <button class="update-dock-action" id="update-dock-action" type="button" hidden>完成更新</button>
    </div>

    <div id="app-modal" class="modal-overlay" hidden>
        <div class="modal-card" role="dialog" aria-modal="true">
            <div class="modal-icon" id="modal-icon-wrap">
                <span id="modal-icon" data-icon="info"></span>
            </div>
            <h3 id="modal-title">提示</h3>
            <p id="modal-message">-</p>

            <div id="update-progress-container" class="progress-wrap" hidden>
                <div class="progress-track">
                    <div id="update-progress-bar" class="progress-bar"></div>
                </div>
                <p id="update-status">正在下载: 0%</p>
            </div>
            <p id="update-changelog" class="update-changelog" hidden></p>

            <div class="modal-actions" id="modal-actions"></div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
